# =============================================================================
# GitHub Actions: 构建 vLLM-Pascal Docker 镜像并推送到阿里云 ACR
#
# 使用方式:
#   1. Fork/推送此仓库到 GitHub
#   2. 在 GitHub 仓库 Settings → Secrets and variables → Actions 中添加:
#      - ACR_REGISTRY:  阿里云镜像仓库地址 (例: registry.cn-hangzhou.aliyuncs.com)
#      - ACR_NAMESPACE: 命名空间 (例: my-namespace)
#      - ACR_USERNAME:  阿里云镜像仓库登录用户名 (完整阿里云账号)
#      - ACR_PASSWORD:  阿里云镜像仓库登录密码 / 固定访问凭证
#   3. 推送代码到 main 分支即可自动触发构建
# =============================================================================
name: Build and Push to ACR

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: '自定义镜像标签 (默认: latest)'
        required: false
        default: 'latest'

env:
  IMAGE_NAME: vllm-pascal
  REGISTRY: ${{ secrets.ACR_REGISTRY }}
  NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  # aliyun/acr-login@v1 等旧 action 仍用 Node 20，临时允许
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag(s)
        id: tag
        run: |
          BASE="${REGISTRY}/${NAMESPACE}/${IMAGE_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tags=${BASE}:${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            echo "tags=${BASE}:${SHORT_SHA},${BASE}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Aliyun ACR
        uses: aliyun/acr-login@v1
        with:
          login-server: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tag.outputs.tags }}
          # 限制并行编译避免 OOM (GitHub runner 为 2 vCPU)
          build-args: |
            MAX_JOBS=2
          # 缓存加速 — inline 模式嵌入镜像，兼容默认 docker driver
          cache-from: type=registry,ref=${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline
